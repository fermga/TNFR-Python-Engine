name: Deploy Documentation to GitHub Pages (DISABLED)

# DISABLED: Documentation is now built locally only. This workflow stays valid
# but only runs on manual dispatch (a workflow with no 'on:' trigger is invalid
# and reports a startup failure on every push). To re-enable automatic deploys,
# add the push triggers under 'on:' below.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy documentation to gh-pages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
      
      - name: Sync README files
        run: |
          python scripts/sync-readme-docs.py
      
      - name: Build MkDocs site
        run: |
          mkdocs build --clean
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy documentation from ${{ github.sha }}'
