name: Build and Deploy Documentation (DISABLED)

# DISABLED: Documentation is now built locally only. This workflow stays valid
# but only runs on manual dispatch (a workflow with no 'on:' trigger is invalid
# and reports a startup failure on every push). To re-enable automatic builds,
# add the push / pull_request triggers under 'on:' below.
on:
  workflow_dispatch: {}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Sync README files
        run: |
          python scripts/sync-readme-docs.py

      - name: Build docs
        run: |
          mkdocs build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          commit_message: "docs: deploy MkDocs site (${GITHUB_SHA})"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-redirects
      - name: Build (no deploy) & basic link check
        run: |
          mkdocs build
          echo "(Basic build complete - consider adding lychee for deeper link checking)"
